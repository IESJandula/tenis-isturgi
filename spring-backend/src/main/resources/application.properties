spring.application.name=backend
server.port=8080

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://tenis-isturgi.51.210.104.106.sslip.io}

# Datasource - Ahora por defecto apunta a tu MySQL local (XAMPP)
# IMPORTANTE: Asegúrate de que la base de datos 'tenis-isturgi' esté creada en tu phpMyAdmin
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/tenis-isturgi?serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.datasource.hikari.initializationFailTimeout=-1

# Hibernate config - Cambiado a dialecto de MySQL
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration

spring.application.name=backend
server.port=8080

# CORS (separado por comas). En producción define CORS_ALLOWED_ORIGINS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# Datasource - Lee de env variables (soporta MySQL o H2)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/tenis_isturgi?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.datasource.hikari.initializationFailTimeout=-1

# Hibernate config
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=false

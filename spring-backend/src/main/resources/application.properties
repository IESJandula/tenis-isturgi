spring.application.name=backend
server.port=8080

# CORS (separado por comas). En producción define CORS_ALLOWED_ORIGINS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# Datasource - Lee de env variables (soporta MySQL o H2)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./testdb;MODE=MySQL;AUTO_SERVER=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.hikari.initializationFailTimeout=-1

# Hibernate config
# update conserva los datos entre reinicios; permite sobrescribirlo con variable de entorno si hace falta
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=false

# Flyway - Migraciones de BD automáticas
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
